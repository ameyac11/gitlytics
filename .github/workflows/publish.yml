name: Upload Python Package to PyPI

on:
  release:
    types: [published]

jobs:
  pypi-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    # REQUIRED for Trusted Publishing
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364ed6af47

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fcd83123c6fbc396a4d483a32fd2266
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish package
        # Fix #23: Pin to a specific immutable tag instead of the mutable @release/v1 branch.
        uses: pypa/gh-action-pypi-publish@v1.13.0
